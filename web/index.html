<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flight Radar Dash</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" aria-hidden="true" focusable="false" style="position: absolute">
      <defs>
        <filter id="chart-paper-grain" x="0%" y="0%" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="4" stitchTiles="stitch" result="noise" />
          <feColorMatrix type="matrix" values="0 0 0 0 0.42  0 0 0 0 0.32  0 0 0 0 0.18  0 0 0 0.1 0" in="noise" result="grain" />
          <feBlend in="SourceGraphic" in2="grain" mode="multiply" />
        </filter>
        <filter id="radar-noir-storm" color-interpolation-filters="sRGB">
          <feColorMatrix
            type="matrix"
            values="0.2126 0.7152 0.0722 0 0  0.2126 0.7152 0.0722 0 0  0.2126 0.7152 0.0722 0 0  0 0 0 1 0"
          />
          <feColorMatrix
            type="matrix"
            values="0.55 0.45 0.25 0 0.04  0.35 0.28 0.15 0 0.03  0.18 0.12 0.06 0 0.02  0 0 0 1 0"
          />
          <feComponentTransfer>
            <feFuncR type="table" tableValues="1 0.92 0.78 0.6 0.42 0.26 0.14 0.05" />
            <feFuncG type="table" tableValues="1 0.88 0.7 0.5 0.32 0.18 0.09 0.03" />
            <feFuncB type="table" tableValues="1 0.82 0.58 0.38 0.22 0.11 0.05 0.01" />
          </feComponentTransfer>
          <feComponentTransfer>
            <feFuncA type="linear" slope="0.78" intercept="-0.02" />
          </feComponentTransfer>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
