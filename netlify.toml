[build]
  command = "npm run netlify:build"
  publish = "web/dist"
  functions = "netlify/functions"

[build.environment]
  NETLIFY = "true"
  NODE_VERSION = "20"
  DB_PATH = "/tmp/flight-radar-dash.sqlite"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "serverless-http", "better-sqlite3"]

[functions.api]
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
